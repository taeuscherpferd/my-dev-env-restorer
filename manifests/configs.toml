[[config]]
id = "vimrc"
description = "Classic Vim configuration"
shared = "configs/shared/vim/.vimrc"
platform_fragments = { android = ["configs/android/vim/.vimrc.fragment"] }
targets = [
  { name = "windows-host", platform = "windows", path = "%USERPROFILE%\\_vimrc" },
  { name = "windows-wsl-main", platform = "linux", path = "\\\\wsl$\\%WSL_DISTRO_NAME%\\home\\%WSL_USERNAME%\\.vimrc", default = false, hosts = ["windows"] },
  { name = "linux-home", platform = "linux", path = "~/.vimrc" },
  { name = "macos-home", platform = "macos", path = "~/.vimrc" },
  { name = "android-home", platform = "android", path = "~/.vimrc" }
]

[[config]]
id = "nvim-init"
description = "Neovim entrypoint that reuses the shared Vim config"
shared = "configs/shared/nvim/init.vim"
targets = [
  { name = "windows-host", platform = "windows", path = "%LOCALAPPDATA%\\nvim\\init.vim" },
  { name = "windows-wsl-main", platform = "linux", path = "\\\\wsl$\\%WSL_DISTRO_NAME%\\home\\%WSL_USERNAME%\\.config\\nvim\\init.vim", default = false, hosts = ["windows"] },
  { name = "linux-home", platform = "linux", path = "~/.config/nvim/init.vim" },
  { name = "macos-home", platform = "macos", path = "~/.config/nvim/init.vim" },
  { name = "android-home", platform = "android", path = "~/.config/nvim/init.vim" }
]

[[config]]
id = "nvim-colors-molokai"
description = "Neovim colorscheme dependency for init.vim"
